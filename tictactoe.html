<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
    }

    #mode-select {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
    }

    #order-select button {
      padding: 0.4rem 1.1rem;
      font-size: 0.9rem;
      border: 2px solid #0f3460;
      border-radius: 8px;
      background: #16213e;
      color: #aaa;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    #order-select button.active {
      background: #0f3460;
      color: #eee;
      border-color: #a0c4ff;
    }

    #mode-select button {
      padding: 0.4rem 1.1rem;
      font-size: 0.9rem;
      border: 2px solid #0f3460;
      border-radius: 8px;
      background: #16213e;
      color: #aaa;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    #mode-select button.active {
      background: #0f3460;
      color: #eee;
      border-color: #a0c4ff;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a0c4ff;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a0c4ff; }

    .cell.winner {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.5s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.08); }
    }

    #reset {
      margin-top: 1.8rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s;
    }

    #reset:hover { background: #c73652; }

    #score {
      display: flex;
      gap: 2.5rem;
      margin-top: 1.5rem;
      font-size: 0.95rem;
      color: #aaa;
    }

    #score span { font-weight: bold; color: #eee; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="mode-select">
    <button id="btn-pvp" class="active">2 Players</button>
    <button id="btn-ai">vs AI</button>
  </div>

  <div id="order-select" style="display:none; gap:0.5rem; margin-bottom:1.2rem;">
    <button id="btn-you-first" class="active">You first</button>
    <button id="btn-ai-first">AI first</button>
  </div>

  <div id="status">X's turn</div>
  <div id="board"></div>
  <button id="reset">New Game</button>
  <div id="score">
    X wins: <span id="xwins">0</span>
    &nbsp;|&nbsp;
    Draws: <span id="draws">0</span>
    &nbsp;|&nbsp;
    O wins: <span id="owins">0</span>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, scores, aiMode, aiSymbol, humanSymbol;

    function init() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      scores = scores || { X: 0, O: 0, D: 0 };
      render();
      setStatus(turnLabel('X'));
      if (aiMode && current === aiSymbol) setTimeout(aiMove, 300);
    }

    function render() {
      const el = document.getElementById('board');
      el.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ' taken ' + val.toLowerCase() : '');
        cell.textContent = val;
        cell.addEventListener('click', () => move(i));
        el.appendChild(cell);
      });
      document.getElementById('xwins').textContent = scores.X;
      document.getElementById('owins').textContent = scores.O;
      document.getElementById('draws').textContent = scores.D;
    }

    function turnLabel(sym) {
      if (!aiMode) return sym + "'s turn";
      return sym === aiSymbol ? 'AI\'s turn' : 'Your turn (' + sym + ')';
    }

    function move(i) {
      if (gameOver || board[i]) return;
      if (aiMode && current === aiSymbol) return;
      applyMove(i);
      if (!gameOver && aiMode && current === aiSymbol) setTimeout(aiMove, 300);
    }

    function applyMove(i) {
      board[i] = current;
      const win = checkWin(board);
      if (win) {
        gameOver = true;
        scores[current]++;
        render();
        highlightWin(win);
        const label = aiMode && current === aiSymbol ? 'AI wins!' : (aiMode ? 'You win!' : current + ' wins!');
        setStatus(label);
      } else if (board.every(v => v)) {
        gameOver = true;
        scores.D++;
        render();
        setStatus("It's a draw!");
      } else {
        current = current === 'X' ? 'O' : 'X';
        render();
        setStatus(turnLabel(current));
      }
    }

    function aiMove() {
      const i = bestMove(board);
      applyMove(i);
    }

    // Minimax — AI maximises, human minimises
    function bestMove(b) {
      let best = -Infinity, idx = -1;
      b.forEach((val, i) => {
        if (val) return;
        b[i] = aiSymbol;
        const score = minimax(b, false, -Infinity, Infinity);
        b[i] = '';
        if (score > best) { best = score; idx = i; }
      });
      return idx;
    }

    function minimax(b, isMax, alpha, beta) {
      const win = checkWin(b);
      if (win) return isMax ? -10 : 10;
      if (b.every(v => v)) return 0;

      if (isMax) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (b[i]) continue;
          b[i] = aiSymbol;
          best = Math.max(best, minimax(b, false, alpha, beta));
          b[i] = '';
          alpha = Math.max(alpha, best);
          if (beta <= alpha) break;
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (b[i]) continue;
          b[i] = humanSymbol;
          best = Math.min(best, minimax(b, true, alpha, beta));
          b[i] = '';
          beta = Math.min(beta, best);
          if (beta <= alpha) break;
        }
        return best;
      }
    }

    function checkWin(b) {
      return WINS.find(([a,c,d]) =>
        b[a] && b[a] === b[c] && b[c] === b[d]
      ) || null;
    }

    function highlightWin(combo) {
      const cells = document.querySelectorAll('.cell');
      combo.forEach(i => cells[i].classList.add('winner'));
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    document.getElementById('reset').addEventListener('click', init);

    document.getElementById('btn-pvp').addEventListener('click', () => {
      aiMode = false;
      scores = { X: 0, O: 0, D: 0 };
      document.getElementById('btn-pvp').classList.add('active');
      document.getElementById('btn-ai').classList.remove('active');
      document.getElementById('order-select').style.display = 'none';
      init();
    });

    document.getElementById('btn-ai').addEventListener('click', () => {
      aiMode = true;
      aiSymbol = 'O';
      humanSymbol = 'X';
      scores = { X: 0, O: 0, D: 0 };
      document.getElementById('btn-ai').classList.add('active');
      document.getElementById('btn-pvp').classList.remove('active');
      document.getElementById('order-select').style.display = 'flex';
      document.getElementById('btn-you-first').classList.add('active');
      document.getElementById('btn-ai-first').classList.remove('active');
      init();
    });

    document.getElementById('btn-you-first').addEventListener('click', () => {
      aiSymbol = 'O'; humanSymbol = 'X';
      scores = { X: 0, O: 0, D: 0 };
      document.getElementById('btn-you-first').classList.add('active');
      document.getElementById('btn-ai-first').classList.remove('active');
      init();
    });

    document.getElementById('btn-ai-first').addEventListener('click', () => {
      aiSymbol = 'X'; humanSymbol = 'O';
      scores = { X: 0, O: 0, D: 0 };
      document.getElementById('btn-ai-first').classList.add('active');
      document.getElementById('btn-you-first').classList.remove('active');
      init();
    });

    aiMode = false;
    aiSymbol = 'O';
    humanSymbol = 'X';
    init();
  </script>
</body>
</html>
