<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arena Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #07070f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }
    canvas { cursor: crosshair; display: block; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width  = 820;
const H = canvas.height = 580;

let state, player, bullets, enemies, particles, score, hiScore, lastTime, spawnTimer, hitFlash;
let mouseX = W / 2, mouseY = H / 2;
const keys = {};
hiScore = 0;

// ── Init ──────────────────────────────────────────────────────────────────────
function reset() {
  state    = 'playing';
  bullets  = [];
  enemies  = [];
  particles = [];
  score    = 0;
  spawnTimer = 0;
  hitFlash   = 0;
  player = {
    x: W / 2, y: H / 2,
    speed: 230,
    radius: 13,
    angle: 0,
    hp: 5, maxHp: 5,
    fireCd: 0, fireRate: 0.13,
    iframes: 0
  };
}

// ── Spawn helpers ─────────────────────────────────────────────────────────────
function spawnEnemy() {
  const side = Math.random() * 4 | 0;
  const pad  = 32;
  let x, y;
  if      (side === 0) { x = Math.random() * W; y = -pad; }
  else if (side === 1) { x = W + pad;  y = Math.random() * H; }
  else if (side === 2) { x = Math.random() * W; y = H + pad; }
  else                 { x = -pad;     y = Math.random() * H; }

  const roll = Math.random();
  const tank = score > 15 && roll < 0.18;
  const fast = score > 5  && roll < (tank ? 0 : 0.30);

  enemies.push({
    x, y,
    radius: tank ? 21 : fast ? 9  : 15,
    speed:  tank ? 55 : fast ? 195 : 88 + score * 1.8,
    hp:     tank ? 4  : 1,
    maxHp:  tank ? 4  : 1,
    col:    tank ? '#ff7043' : fast ? '#ff2d78' : '#e94560',
    dead:   false
  });
}

function burst(x, y, col, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 50 + Math.random() * 140;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      r: 1.5 + Math.random() * 3, life: 1,
      decay: 1.4 + Math.random() * 1.8, col });
  }
}

// ── Update ────────────────────────────────────────────────────────────────────
function update(dt) {
  if (state !== 'playing') return;

  // Player move
  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['a']) dx -= 1;
  if (keys['ArrowRight'] || keys['d']) dx += 1;
  if (keys['ArrowUp']    || keys['w']) dy -= 1;
  if (keys['ArrowDown']  || keys['s']) dy += 1;
  if (dx && dy) { dx *= 0.707; dy *= 0.707; }
  player.x = Math.max(player.radius, Math.min(W - player.radius, player.x + dx * player.speed * dt));
  player.y = Math.max(player.radius, Math.min(H - player.radius, player.y + dy * player.speed * dt));
  player.angle = Math.atan2(mouseY - player.y, mouseX - player.x);

  // Shoot
  player.fireCd -= dt;
  if (player.fireCd <= 0) {
    player.fireCd = player.fireRate;
    bullets.push({
      x: player.x + Math.cos(player.angle) * player.radius,
      y: player.y + Math.sin(player.angle) * player.radius,
      vx: Math.cos(player.angle) * 580,
      vy: Math.sin(player.angle) * 580,
      r: 4
    });
  }

  // Bullets move + cull
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.x < -30 || b.x > W+30 || b.y < -30 || b.y > H+30) bullets.splice(i, 1);
  }

  // Spawn
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnTimer = Math.max(0.22, 1.6 - score * 0.038);
    spawnEnemy();
    if (score > 8 && Math.random() < 0.25) spawnEnemy();
  }

  // Enemies
  player.iframes = Math.max(0, player.iframes - dt);
  hitFlash = Math.max(0, hitFlash - dt);

  for (const e of enemies) {
    if (e.dead) continue;
    const a = Math.atan2(player.y - e.y, player.x - e.x);
    e.x += Math.cos(a) * e.speed * dt;
    e.y += Math.sin(a) * e.speed * dt;

    // Bullet collision
    for (let j = bullets.length - 1; j >= 0; j--) {
      if (e.dead) break;
      const b = bullets[j];
      if (Math.hypot(b.x - e.x, b.y - e.y) < e.radius + b.r) {
        bullets.splice(j, 1);
        burst(b.x, b.y, e.col, 5);
        if (--e.hp <= 0) {
          e.dead = true;
          burst(e.x, e.y, e.col, 14);
          hiScore = Math.max(hiScore, ++score);
        }
      }
    }

    // Player collision
    if (!e.dead && player.iframes <= 0 &&
        Math.hypot(player.x - e.x, player.y - e.y) < player.radius + e.radius) {
      e.dead = true;
      player.iframes = 0.9;
      hitFlash = 0.15;
      burst(player.x, player.y, '#7cf', 10);
      if (--player.hp <= 0) {
        state = 'dead';
        burst(player.x, player.y, '#7cf', 30);
      }
    }
  }
  enemies = enemies.filter(e => !e.dead);

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= 0.90;     p.vy *= 0.90;
    p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw() {
  // Background
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y <= H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Hit flash overlay
  if (hitFlash > 0) {
    ctx.fillStyle = `rgba(255,60,60,${hitFlash * 2.5})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Bullets
  ctx.shadowColor = '#ffe066'; ctx.shadowBlur = 10;
  ctx.fillStyle = '#ffe066';
  for (const b of bullets) {
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Enemies
  for (const e of enemies) {
    ctx.shadowColor = e.col; ctx.shadowBlur = 14;
    ctx.fillStyle = e.col;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2); ctx.fill();
    if (e.maxHp > 1) {
      const bw = e.radius * 2;
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#222';
      ctx.fillRect(e.x - e.radius, e.y - e.radius - 9, bw, 4);
      ctx.fillStyle = '#ff9800';
      ctx.fillRect(e.x - e.radius, e.y - e.radius - 9, bw * (e.hp / e.maxHp), 4);
    }
  }
  ctx.shadowBlur = 0;

  // Player
  if (state === 'playing' || state === 'dead') {
    const flicker = player.iframes > 0 && Math.floor(player.iframes * 12) % 2 === 0;
    if (!flicker) {
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(player.angle);
      ctx.shadowColor = '#7cf'; ctx.shadowBlur = 16;
      ctx.fillStyle = '#7cf';
      ctx.beginPath();
      ctx.moveTo(player.radius + 2, 0);
      ctx.lineTo(-player.radius, -player.radius * 0.75);
      ctx.lineTo(-player.radius * 0.45, 0);
      ctx.lineTo(-player.radius, player.radius * 0.75);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();
    }
  }

  // HUD — HP bar
  const bx = 14, by = H - 26, bw = 130, bh = 10;
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(bx, by, bw, bh);
  const ratio = player.hp / player.maxHp;
  ctx.fillStyle = ratio > 0.5 ? '#4caf50' : ratio > 0.25 ? '#ff9800' : '#e94560';
  ctx.fillRect(bx, by, bw * ratio, bh);
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, bw, bh);
  ctx.fillStyle = '#888'; ctx.font = '12px Segoe UI'; ctx.textAlign = 'left';
  ctx.fillText('HP', bx + bw + 6, by + 9);

  // HUD — score
  ctx.fillStyle = '#eee'; ctx.font = 'bold 18px Segoe UI'; ctx.textAlign = 'right';
  ctx.fillText('Score: ' + score, W - 14, 26);
  ctx.fillStyle = '#555'; ctx.font = '13px Segoe UI';
  ctx.fillText('Best: ' + hiScore, W - 14, 44);

  // Hint (first few seconds)
  if (state === 'playing' && score === 0 && enemies.length <= 1) {
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = '13px Segoe UI'; ctx.textAlign = 'center';
    ctx.fillText('Arrow keys / WASD to move  •  Mouse to aim  •  Auto-fire', W/2, H - 10);
  }

  // Game over
  if (state === 'dead') {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, W, H);
    ctx.shadowColor = '#e94560'; ctx.shadowBlur = 30;
    ctx.fillStyle = '#e94560'; ctx.font = 'bold 52px Segoe UI'; ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W/2, H/2 - 44);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#eee'; ctx.font = '24px Segoe UI';
    ctx.fillText('Score: ' + score, W/2, H/2 + 4);
    ctx.fillStyle = '#888'; ctx.font = '15px Segoe UI';
    ctx.fillText('Press Enter or click to play again', W/2, H/2 + 42);
    ctx.textAlign = 'left';
  }
}

// ── Loop ──────────────────────────────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min((ts - (lastTime || ts)) / 1000, 0.05);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ── Input ─────────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'Enter' && state === 'dead') reset();
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
});
canvas.addEventListener('click', () => { if (state === 'dead') reset(); });

reset();
requestAnimationFrame(loop);
</script>
</body>
</html>
